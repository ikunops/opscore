# ============================================================
# OpsCore 反向代理配置(配合 OpsCore 的 -addr 127.0.0.1:8088 使用)
# 用法:
#   1. 把本文件放到 /etc/nginx/conf.d/opscore.conf
#   2. 把 server_name 改成你的域名/主机名
#   3. nginx -t && systemctl reload nginx
# 前置条件:OpsCore 以 ./opscore -addr 127.0.0.1:8088 仅本机监听,
#           nginx 独占 80/443,二者不冲突。
# ============================================================

server {
    listen 80;
    server_name opscore.example.com;   # ← 改成你的域名或主机名

    # 可选:基础认证。因 demo 无登录鉴权,公网暴露强烈建议开启。
    # 生成密码文件: htpasswd -c /etc/nginx/.opscore_htpasswd admin
    # auth_basic "OpsCore";
    # auth_basic_user_file /etc/nginx/.opscore_htpasswd;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

